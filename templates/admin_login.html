{% extends "base.html" %}
{% block title %}PYSTORE – Admin Login{% endblock %}
{% block content %}
<div style="max-width:420px;margin:5rem auto;">

  <div style="text-align:center;margin-bottom:2rem;">
    <div style="width:64px;height:64px;background:rgba(59,130,246,.12);border:1px solid rgba(59,130,246,.25);
                border-radius:16px;display:flex;align-items:center;justify-content:center;
                font-size:1.75rem;margin:0 auto 1.25rem;">🔐</div>
    <h1 style="font-size:1.75rem;">Panel <span class="accent">Admin</span></h1>
    <p class="text-muted" style="margin-top:0.4rem;">Masukkan password untuk akses dashboard</p>
  </div>

  <div class="card">
    <form method="POST" action="/admin">
      <div class="form-group">
        <label>Password Admin</label>
        <input type="password" name="password" placeholder="••••••••" autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        🔓 Masuk sebagai Admin
      </button>
    </form>
  </div>

  <div style="text-align:center;margin-top:1.5rem;">
    <a href="/" class="text-muted" style="font-size:0.875rem;text-decoration:none;">← Kembali ke Toko</a>
  </div>

</div>
{% endblock %}
