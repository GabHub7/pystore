{% extends "base.html" %}
{% block title %}Admin Login – PYSTORE{% endblock %}
{% block content %}
<div style="max-width:400px;margin:6rem auto;">
  <div style="text-align:center;margin-bottom:2rem;">
    <div style="width:72px;height:72px;background:var(--blue-dim);border:1px solid rgba(96,165,250,.25);
                border-radius:20px;display:flex;align-items:center;justify-content:center;
                font-size:2rem;margin:0 auto 1.25rem;">🔐</div>
    <h1 style="font-size:1.8rem;">Admin <span class="accent">Login</span></h1>
    <p class="text-muted" style="margin-top:.4rem;">Masuk ke panel admin PYSTORE</p>
  </div>
  <div class="card">
    <form method="POST" action="/admin">
      <div class="form-group">
        <label>Password Admin</label>
        <input type="password" name="password" placeholder="••••••••" autofocus required>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">Masuk ke Dashboard</button>
    </form>
  </div>
  <div style="text-align:center;margin-top:1.5rem;">
    <a href="/" class="text-muted" style="font-size:.875rem;text-decoration:none;">← Kembali ke Toko</a>
  </div>
</div>
{% endblock %}
