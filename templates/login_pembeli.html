{% extends "base.html" %}
{% block title %}PYSTORE – Masuk sebagai Pembeli{% endblock %}
{% block content %}
<div style="max-width:420px;margin:5rem auto;">

  <div style="text-align:center;margin-bottom:2rem;">
    <div style="width:64px;height:64px;background:var(--accent-dim);border:1px solid rgba(245,158,11,.25);
                border-radius:16px;display:flex;align-items:center;justify-content:center;
                font-size:1.75rem;margin:0 auto 1.25rem;">👤</div>
    <h1 style="font-size:1.75rem;">Masuk sebagai <span class="accent">Pembeli</span></h1>
    <p class="text-muted" style="margin-top:0.4rem;">Masukkan nama untuk memulai belanja</p>
  </div>

  <div class="card">
    <form method="POST" action="/login-pembeli">
      <div class="form-group">
        <label>Nama / Nickname</label>
        <input type="text" name="nama" placeholder="Contoh: Budi, Siti..." autofocus>
      </div>
      <button type="submit" class="btn btn-primary btn-full btn-lg">
        Masuk &amp; Mulai Belanja 🛍️
      </button>
    </form>
  </div>

  <div style="text-align:center;margin-top:1.5rem;">
    <a href="/" class="text-muted" style="font-size:0.875rem;text-decoration:none;">← Kembali ke Toko</a>
  </div>

</div>
{% endblock %}
