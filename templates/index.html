<!DOCTYPE html>
<html lang="id" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pystore - Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="flex">
    <aside class="w-64 h-screen sticky top-0 bg-[var(--bg-sidebar)] border-r border-[var(--border)] p-6">
        <div class="text-2xl font-bold text-[var(--accent)] mb-10 flex items-center gap-2">
            <span class="w-8 h-8 bg-[var(--accent)] rounded-lg"></span> Pystore
        </div>
        <nav class="space-y-4">
            <div class="sidebar-item active p-3 cursor-pointer">Dashboard</div>
            <div class="sidebar-item p-3 cursor-pointer text-[var(--text-muted)]">Produk</div>
            <div class="sidebar-item p-3 cursor-pointer text-[var(--text-muted)]">Pesanan</div>
            <div class="sidebar-item p-3 cursor-pointer text-[var(--text-muted)]">Laporan</div>
            <div class="sidebar-item p-3 cursor-pointer text-[var(--text-muted)] mt-10" onclick="toggleTheme()">Ganti Tema</div>
        </nav>
    </aside>

    <main class="flex-1 p-8">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-2xl font-bold">Dashboard</h1>
            <div class="flex items-center gap-4">
                <span class="text-[var(--text-muted)]">Admin Pystore</span>
                <img src="https://ui-avatars.com/api/?name=Admin" class="w-10 h-10 rounded-full border-2 border-[var(--accent)]">
            </div>
        </header>

        <div class="grid grid-cols-3 gap-6 mb-8">
            <div class="card">
                <p class="text-[var(--text-muted)] mb-2">Total Penjualan</p>
                <h2 class="text-3xl font-bold text-[var(--accent)]">Rp 33.375.000</h2>
            </div>
            <div class="card">
                <p class="text-[var(--text-muted)] mb-2">Pesanan Baru</p>
                <h2 class="text-3xl font-bold">13</h2>
            </div>
            <div class="card">
                <p class="text-[var(--text-muted)] mb-2">Pelanggan</p>
                <h2 class="text-3xl font-bold">32</h2>
            </div>
        </div>

        <div class="card overflow-hidden">
            <div class="flex justify-between items-center mb-4">
                <h3 class="font-semibold">Daftar Pesanan Terbaru</h3>
                <input type="text" placeholder="Cari..." class="bg-[var(--input-bg)] border border-[var(--border)] rounded-lg px-4 py-1 text-sm">
            </div>
            <table class="w-full text-left">
                <thead class="text-[var(--text-muted)] border-b border-[var(--border)] text-sm">
                    <tr>
                        <th class="py-3">Order ID</th>
                        <th>Pelanggan</th>
                        <th>Total</th>
                        <th>Status</th>
                        <th>Aksi</th>
                    </tr>
                </thead>
                <tbody class="text-sm">
                    <tr class="border-b border-[var(--border)]">
                        <td class="py-4">#880224</td>
                        <td>Dimas Pratama</td>
                        <td>Rp 250.000</td>
                        <td><span class="bg-green-500/20 text-green-500 px-3 py-1 rounded-full text-xs">Selesai</span></td>
                        <td><button class="text-[var(--accent)]">Lihat</button></td>
                    </tr>
                </tbody>
            </table>
        </div>
    </main>

    <script src="assets/js/theme.js"></script>
</body>
</html>
