{% extends "base.html" %}
{% block title %}PYSTORE – Masuk sebagai Pembeli{% endblock %}
{% block content %}

<div style="max-width:420px;margin:4rem auto;">
  <div class="page-header" style="text-align:center;">
    <p style="font-size:3rem;">👤</p>
    <h1>Panel <span class="text-accent">Pembeli</span></h1>
    <p class="text-muted">Masukkan nama untuk memulai belanja</p>
  </div>

  <div class="card">
    <form method="POST" action="/login-pembeli">
      <div class="form-group">
        <label>Nama / Nickname</label>
        <input type="text" name="nama" placeholder="Contoh: Budi, Siti, Tamu..." autofocus>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center;padding:0.75rem;">
        Masuk & Mulai Belanja 🛍️
      </button>
    </form>
  </div>

  <div style="text-align:center;margin-top:1.5rem;">
    <a href="/" class="text-muted" style="font-size:0.9rem;text-decoration:none;">← Kembali ke Toko</a>
  </div>
</div>

{% endblock %}
